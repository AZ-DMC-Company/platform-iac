name: delete-backend-rg

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete RG
        run: |
          az group delete \
            --name orders-rg-tfstate-dev-eus-01 \
            --yes --no-wait