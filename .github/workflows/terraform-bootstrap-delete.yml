name: Terraform Bootstrap delete

on:
  workflow_dispatch

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bootstrap

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete resource group of tfstate
        run: |
            az group delete --name rg-ricvera-dev-eastus-01 --yes --no-wait