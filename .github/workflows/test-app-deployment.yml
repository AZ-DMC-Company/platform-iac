name: test-app-deployment

on:
  workflow_dispatch:

jobs:
  test-app:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set environment variables
        run: |
          # URL del frontend, puede ser un output de Terraform si lo guardas
          echo "FRONTEND_URL=$(az containerapp show \
            --name orders-frontend-dev-01 \
            --resource-group orders-rg-app-dev-eus-01 \
            --query properties.configuration.ingress.fqdn -o tsv)" >> $GITHUB_ENV

      - name: Test Frontend HTTP response
        run: |
          echo "Testing frontend at $FRONTEND_URL ..."
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://$FRONTEND_URL)
          echo "Frontend HTTP status: $STATUS_CODE"
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Frontend health check failed!"
            exit 1
          fi
          echo "Frontend health check passed."

      - name: Test Frontend → Backend integration
        run: |
          echo "Testing frontend-backend integration ..."
          # Esto depende de tu API de ejemplo, ajusta el endpoint
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://$FRONTEND_URL/api/test)
          echo "Integration HTTP status: $RESPONSE"
          if [ "$RESPONSE" -ne 200 ]; then
            echo "Frontend-backend integration check failed!"
            exit 1
          fi
          echo "Frontend-backend integration check passed."