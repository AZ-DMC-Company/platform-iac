name: test-app-deployment

on:
  workflow_dispatch:

jobs:
  test-app:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: List Container App Environments
        run: |
          echo "Listing all Container App Environments in the subscription..."
          az containerapp env list -o table

      - name: List Storage in specific CA Environment
        run: |
          ENV_NAME="orders-env-dev-01"
          RG_NAME="orders-rg-app-dev-eus-01"
          echo "Listing Managed Environment Storage for $ENV_NAME..."
          az containerapp env storage list \
            --name $ENV_NAME \
            --resource-group $RG_NAME \
            -o table

      - name: Check Grafana replicas
        run: |
          echo "Checking Grafana replicas and status..."
          az containerapp revision list \
            --name orders-grafana-dev-01 \
            --resource-group orders-rg-app-dev-eus-01

      - name: Tail Grafana logs
        run: |
          echo "Streaming Grafana logs..."
          az containerapp logs show \
            --name orders-grafana-dev-01 \
            --resource-group orders-rg-app-dev-eus-01 \
            --follow            

      - name: Set environment variables
        run: |
          echo "FRONTEND_URL=$(az containerapp show \
            --name orders-frontend-dev-01 \
            --resource-group orders-rg-app-dev-eus-01 \
            --query properties.configuration.ingress.fqdn -o tsv)" >> $GITHUB_ENV
          echo "BACKEND_URL=$(az containerapp show \
            --name orders-backend-dev-01 \
            --resource-group orders-rg-app-dev-eus-01 \
            --query properties.configuration.ingress.fqdn -o tsv)" >> $GITHUB_ENV
          echo "PROMETHEUS_URL=$(az containerapp show \
            --name orders-prometheus-dev-01 \
            --resource-group orders-rg-app-dev-eus-01 \
            --query properties.configuration.ingress.fqdn -o tsv)" >> $GITHUB_ENV          
          echo "GRAFANA_URL=$(az containerapp show \
            --name orders-grafana-dev-01 \
            --resource-group orders-rg-app-dev-eus-01 \
            --query properties.configuration.ingress.fqdn -o tsv)" >> $GITHUB_ENV

           
      - name: Test Frontend HTTP response
        run: |
          echo "Testing frontend at $FRONTEND_URL ..."
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://$FRONTEND_URL)
          echo "Frontend HTTP status: $STATUS_CODE"
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Frontend health check failed!"
            exit 1
          fi
          echo "Frontend health check passed."

      - name: Check backend replicas
        run: |
          echo "Checking backend replicas..."
          az containerapp revision list \
            --name orders-backend-dev-01 \
            --resource-group orders-rg-app-dev-eus-01 \
            --query "[].{name:name, active:activeReplicas}" \
            -o table

      - name: Check backend app status
        run: |
          STATUS=$(az containerapp show \
            --name orders-backend-dev-01 \
            --resource-group orders-rg-app-dev-eus-01 \
            --query "properties.provisioningState" -o tsv)
          echo "Backend provisioning state: $STATUS"
          if [ "$STATUS" != "Succeeded" ]; then
            echo "Backend is not ready!"
            exit 1
          fi

      - name: Test Backend HTTP response
        run: |
          echo "Testing backend at $BACKEND_URL ..."
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://$BACKEND_URL/actuator/health)
          echo "Backend HTTP status: $STATUS_CODE"
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Backend health check failed!"
            exit 1
          fi
          echo "Backend health check passed."

      - name: Test Prometheus HTTP response
        run: |
          echo "Testing Prometheus at $PROMETHEUS_URL ..."
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://$PROMETHEUS_URL/query)
          echo "Prometheus HTTP status: $STATUS_CODE"
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Prometheus health check failed!"
            exit 1
          fi
          echo "Prometheus health check passed."            

      - name: Test Grafana HTTP response
        run: |
          echo "Testing Grafana at $GRAFANA_URL ..."
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://$GRAFANA_URL)
          echo "Grafana HTTP status: $STATUS_CODE"
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Grafana health check failed!"
            exit 1
          fi
          echo "Grafana health check passed."              