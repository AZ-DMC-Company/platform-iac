name: deploy-app

on:
  workflow_dispatch:

jobs:

  terraform:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd infrastructure
          terraform init

      - name: Terraform Apply
        run: |
          cd infrastructure
          terraform apply \
          -var="frontend_image=${{ secrets.FRONTEND_IMAGE_NAME }}" \
          -var="backend_image=${{ secrets.BACKEND_IMAGE_NAME }}" \
          -auto-approve